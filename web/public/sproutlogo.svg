<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none">
  <!-- Sprout icon: stem + two leaves -->
  <g transform="translate(4, 4)">
    <!-- Left leaf -->
    <path d="M24 36 C24 36 10 30 8 16 C8 16 20 14 26 26 Z" fill="#4ade80"/>
    <!-- Right leaf -->
    <path d="M24 36 C24 36 38 28 40 14 C40 14 28 12 22 26 Z" fill="#22c55e"/>
    <!-- Stem -->
    <path d="M24 48 C24 48 24 30 24 24" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Ground arc -->
    <path d="M16 48 Q24 44 32 48" stroke="#16a34a" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Wordmark -->
  <text x="58" y="37" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="26" letter-spacing="-0.8" fill="#ffffff">Sprout</text>
</svg>
